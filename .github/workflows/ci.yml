name: CI/CD – Build, Test & Release

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  FLUTTER_VERSION: "3.41.2"
  JAVA_VERSION: "17"
  MIN_COVERAGE: 40

jobs:
  # ─────────────────────────────────────────────
  # 1. Analyze & Test
  # ─────────────────────────────────────────────
  test:
    name: Analyze & Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Dart format check
        run: dart format --set-exit-if-changed .

      - name: Flutter analyze
        run: flutter analyze --no-fatal-infos

      - name: Run tests with coverage
        run: flutter test --coverage --concurrency=4

      - name: Check coverage threshold
        run: |
          if [ -f coverage/lcov.info ]; then
            TOTAL_LINES=$(grep -c "DA:" coverage/lcov.info || echo "0")
            COVERED=$(grep "DA:" coverage/lcov.info | grep -cv ",0$" || echo "0")
            if [ "$TOTAL_LINES" -gt 0 ]; then
              PERCENT=$((COVERED * 100 / TOTAL_LINES))
              echo "Coverage: $PERCENT% ($COVERED/$TOTAL_LINES lines)"
              if [ "$PERCENT" -lt "${{ env.MIN_COVERAGE }}" ]; then
                echo "::error::Coverage $PERCENT% is below minimum ${{ env.MIN_COVERAGE }}%"
                exit 1
              fi
            fi
          fi

      - name: Upload coverage
        if: success()
        uses: codecov/codecov-action@v4
        with:
          file: coverage/lcov.info
          fail_ci_if_error: false

  # ─────────────────────────────────────────────
  # 2. Security & Dependency Audit
  # ─────────────────────────────────────────────
  security:
    name: Security Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Check outdated dependencies
        run: flutter pub outdated || true

      - name: Verify no hard-coded secrets
        run: |
          echo "Scanning for potential secrets..."
          PATTERNS='(api[_-]?key|secret|password|token|credential)\s*[:=]\s*["\x27][^\s"'\'']+["\x27]'
          MATCHES=$(grep -rnE "$PATTERNS" lib/ --include="*.dart" || true)
          if [ -n "$MATCHES" ]; then
            echo "::warning::Potential hard-coded secrets found:"
            echo "$MATCHES"
          else
            echo "No hard-coded secrets detected."
          fi

  # ─────────────────────────────────────────────
  # 2. Build Android APK (Debug)
  # ─────────────────────────────────────────────
  build-android:
    name: Build Android
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: ${{ env.JAVA_VERSION }}

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Build APK
        run: flutter build apk --release --obfuscate --split-debug-info=build/debug-info

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: mdf-release-apk
          path: build/app/outputs/flutter-apk/app-release.apk

      - name: Upload debug symbols
        uses: actions/upload-artifact@v4
        with:
          name: mdf-debug-symbols
          path: build/debug-info/

  # ─────────────────────────────────────────────
  # 3. Build App Bundle (for Play Store)
  # ─────────────────────────────────────────────
  build-aab:
    name: Build App Bundle
    needs: test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: ${{ env.JAVA_VERSION }}

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Build AAB
        run: flutter build appbundle --release --obfuscate --split-debug-info=build/debug-info

      - name: Upload AAB artifact
        uses: actions/upload-artifact@v4
        with:
          name: mdf-release-aab
          path: build/app/outputs/bundle/release/app-release.aab

  # ─────────────────────────────────────────────
  # 4. Build iOS (requires macOS runner)
  # ─────────────────────────────────────────────
  build-ios:
    name: Build iOS
    needs: test
    runs-on: macos-latest
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Build iOS (no-codesign)
        run: flutter build ios --release --no-codesign --obfuscate --split-debug-info=build/debug-info

      - name: Upload iOS build
        uses: actions/upload-artifact@v4
        with:
          name: mdf-ios-build
          path: build/ios/iphoneos/

  # ─────────────────────────────────────────────
  # 5. Build Web
  # ─────────────────────────────────────────────
  build-web:
    name: Build Web
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Build Web (release)
        run: flutter build web --release --web-renderer canvaskit --base-href /

      - name: Upload Web artifact
        uses: actions/upload-artifact@v4
        with:
          name: mdf-web-build
          path: build/web/

  # ─────────────────────────────────────────────
  # 6. Build Windows (for desktop support)
  # ─────────────────────────────────────────────
  build-windows:
    name: Build Windows
    needs: test
    runs-on: windows-latest
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Build Windows
        run: flutter build windows --release

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: mdf-windows-build
          path: build/windows/x64/runner/Release/
